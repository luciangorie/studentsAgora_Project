<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Students Agora - Home</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --main: #14213d;
            --accent: #fca311;
            --accent-dark: #c97c00;
            --bg: #1a1f2b;
            --purple: #6c3fcf;
            --text: #e5e5e5;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
        }
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(20,33,61,0.97);
            padding: 0 18px;
            height: 70px;
            box-shadow: 0 2px 8px rgba(20,33,61,0.12);
        }
        .bar-btn {
            border: none;
            border-radius: 18px;
            font-size: 1.1rem;
            font-weight: 700;
            padding: 10px 22px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }
        .bar-btn.yellow {
            background: linear-gradient(90deg, var(--accent) 60%, var(--accent-dark) 100%);
            color: var(--main);
        }
        .bar-btn.purple {
            background: linear-gradient(90deg, var(--purple) 60%, #4b2e83 100%);
            color: #fff;
            margin: 0 18px;
        }
        .bar-btn.plus {
            background: #fff;
            color: var(--main);
            border-radius: 50%;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            box-shadow: 0 2px 8px rgba(252,163,17,0.12);
        }
        .feed {
            margin: 0 auto;
            max-width: 700px;
            padding: 40px 18px 0 18px;
            min-height: 400px;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <button class="bar-btn yellow">Test Area</button>
        <button class="bar-btn purple">Ambassadors and Council news</button>
        <button class="bar-btn plus" title="Add"><span>+</span></button>
    </div>
    <div class="feed">
        <!-- Feed area, empty for now -->
    </div>
</body>
</html>
