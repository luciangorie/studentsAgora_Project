<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Students Agora - Home</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --main: #14213d;
            --accent: #fca311;
            --accent-dark: #c97c00;
            --bg: #1a1f2b;
            --purple: #6c3fcf;
            --text: #e5e5e5;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
        }
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(20,33,61,0.97);
            padding: 0 18px;
            height: 70px;
            box-shadow: 0 2px 8px rgba(20,33,61,0.12);
        }
        .bar-btn {
            border: none;
            border-radius: 18px;
            font-size: 1.1rem;
            font-weight: 700;
            padding: 10px 22px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }
        .bar-btn.yellow {
            background: linear-gradient(90deg, var(--accent) 60%, var(--accent-dark) 100%);
            color: var(--main);
        }
        .bar-btn.purple {
            background: linear-gradient(90deg, var(--purple) 60%, #4b2e83 100%);
            color: #fff;
            margin: 0 18px;
        }
        .bar-btn.plus {
            background: #fff;
            color: var(--main);
            border-radius: 50%;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            box-shadow: 0 2px 8px rgba(252,163,17,0.12);
        }
        .feed {
            margin: 0 auto;
            max-width: 700px;
            padding: 40px 18px 0 18px;
            min-height: 400px;
        }
    </style>
</head>
<body>
    <div class="top-bar">
    <button class="bar-btn yellow" onclick="window.location.href='student_details.html'">Test Area</button>
        <button class="bar-btn purple">Ambassadors and Council news</button>
    <button class="bar-btn plus" title="Add" onclick="window.location.href='create_post.html'"><span>+</span></button>
    </div>
    <div class="feed" id="feed">
        <!-- Feed area, posts will be loaded here -->
    </div>
    <script>
    async function loadPosts() {
        try {
            const response = await fetch('/api/v1/posts/allposts');
            const result = await response.json();
            if (result.success && Array.isArray(result.data)) {
                const feed = document.getElementById('feed');
                feed.innerHTML = '';
                result.data.forEach(post => {
                    const card = document.createElement('div');
                    card.style.background = '#fff';
                    card.style.color = '#14213d';
                    card.style.borderRadius = '14px';
                    card.style.boxShadow = '0 2px 12px rgba(20,33,61,0.10)';
                    card.style.marginBottom = '28px';
                    card.style.padding = '18px';
                    card.style.display = 'flex';
                    card.style.flexDirection = 'column';
                    card.style.alignItems = 'center';
                    card.style.maxWidth = '420px';
                    card.style.marginLeft = 'auto';
                    card.style.marginRight = 'auto';
                    card.style.position = 'relative';

                    // Badge facce in alto a destra
                    if (post.faceCount !== undefined && post.faceCount !== null && post.faceCount > 0) {
                        const badge = document.createElement('div');
                        badge.style.position = 'absolute';
                        badge.style.top = '10px';
                        badge.style.right = '12px';
                        badge.style.background = '#6c3fcf';
                        badge.style.color = '#fff';
                        badge.style.borderRadius = '20px';
                        badge.style.padding = '4px 10px 4px 8px';
                        badge.style.fontSize = '0.85rem';
                        badge.style.fontWeight = '700';
                        badge.style.display = 'flex';
                        badge.style.alignItems = 'center';
                        badge.style.gap = '4px';
                        badge.style.boxShadow = '0 2px 6px rgba(108,63,207,0.35)';
                        badge.innerHTML = '&#128100; ' + post.faceCount;
                        card.appendChild(badge);
                    }

                    // Username e data SOPRA il post
                    const meta = document.createElement('div');
                    meta.style.display = 'flex';
                    meta.style.alignItems = 'center';
                    meta.style.justifyContent = 'center';
                    meta.style.gap = '8px';
                    meta.style.fontSize = '1.08rem';
                    meta.style.color = '#111';
                    meta.style.fontWeight = '700';
                    meta.style.marginBottom = '10px';
                    meta.style.fontFamily = 'Segoe UI, Arial, sans-serif';
                    if (post.author) {
                        const userSpan = document.createElement('span');
                        userSpan.textContent = post.author;
                        userSpan.style.fontWeight = '700';
                        userSpan.style.fontSize = '1.13rem';
                        userSpan.style.letterSpacing = '0.2px';
                        userSpan.style.padding = '2px 10px';
                        userSpan.style.borderRadius = '8px';
                        userSpan.style.background = '#f5f5f5';
                        userSpan.style.boxShadow = '0 1px 4px rgba(20,33,61,0.06)';
                        meta.appendChild(userSpan);
                    }
                    if (post.date) {
                        const d = new Date(post.date);
                        const dateSpan = document.createElement('span');
                        dateSpan.textContent = '• ' + d.toLocaleDateString();
                        dateSpan.style.fontWeight = '400';
                        dateSpan.style.fontSize = '0.98rem';
                        dateSpan.style.color = '#888';
                        meta.appendChild(dateSpan);
                    }
                    card.appendChild(meta);

                    // Hashtag area SOPRA il post (senza #, bordo viola, sfondo bianco)
                    if (post.hashtags && post.hashtags.length > 0) {
                        const hashtagsArea = document.createElement('div');
                        hashtagsArea.style.display = 'flex';
                        hashtagsArea.style.flexWrap = 'wrap';
                        hashtagsArea.style.gap = '8px';
                        hashtagsArea.style.justifyContent = 'center';
                        hashtagsArea.style.margin = '0 0 10px 0';
                        post.hashtags.forEach(h => {
                            const tag = document.createElement('span');
                            tag.textContent = h;
                            tag.style.background = '#fff';
                            tag.style.color = '#4b2e83';
                            tag.style.border = '2px solid #6c3fcf';
                            tag.style.borderRadius = '50px';
                            tag.style.padding = '4px 14px';
                            tag.style.fontSize = '0.98rem';
                            tag.style.fontWeight = '600';
                            tag.style.letterSpacing = '0.5px';
                            tag.style.backgroundClip = 'padding-box';
                            tag.style.boxSizing = 'border-box';
                            hashtagsArea.appendChild(tag);
                        });
                        card.appendChild(hashtagsArea);
                    }

                    // Immagine
                    if (post.picture) {
                        const img = document.createElement('img');
                        img.src = post.picture;
                        img.alt = '';
                        img.style.width = '100%';
                        img.style.maxWidth = '380px';
                        img.style.height = 'auto';
                        img.style.objectFit = 'contain';
                        img.style.borderRadius = '10px';
                        img.style.marginBottom = '12px';
                        img.onerror = () => {
                            img.style.display = 'none';
                            const errDiv = document.createElement('div');
                            errDiv.textContent = '⚠️ Immagine non caricabile: ' + post.picture;
                            errDiv.style.fontSize = '0.82rem';
                            errDiv.style.color = '#c0392b';
                            errDiv.style.background = '#ffeaea';
                            errDiv.style.borderRadius = '6px';
                            errDiv.style.padding = '6px 10px';
                            errDiv.style.marginBottom = '10px';
                            errDiv.style.wordBreak = 'break-all';
                            card.insertBefore(errDiv, img.nextSibling);
                        };
                        card.appendChild(img);
                    }
                    // Descrizione (senza hashtag)
                    if (post.text) {
                        const desc = document.createElement('div');
                        desc.textContent = post.text;
                        desc.style.fontSize = '1.08rem';
                        desc.style.marginBottom = '8px';
                        desc.style.textAlign = 'center';
                        card.appendChild(desc);
                    }
                    // Many people label
                    if (post.faceCount !== undefined && post.faceCount !== null && post.faceCount >= 4) {
                        const faceDiv = document.createElement('div');
                        faceDiv.textContent = 'Many people in this pic!';
                        faceDiv.style.fontSize = '0.92rem';
                        faceDiv.style.color = '#6c3fcf';
                        faceDiv.style.fontWeight = '600';
                        faceDiv.style.marginBottom = '6px';
                        faceDiv.style.textAlign = 'center';
                        faceDiv.style.letterSpacing = '0.4px';
                        card.appendChild(faceDiv);
                    }
                    // Together with
                    if (post.togetherwith && post.togetherwith.length > 0) {
                        const tw = document.createElement('div');
                        tw.textContent = 'Together with: ' + post.togetherwith.join(', ');
                        tw.style.fontSize = '0.98rem';
                        tw.style.color = '#c97c00';
                        tw.style.marginBottom = '4px';
                        card.appendChild(tw);
                    }

                    // Pulsante "Lascia un commento" piccolo e poco visibile
                    const commentBtn = document.createElement('button');
                    commentBtn.textContent = 'Lascia un commento';
                    commentBtn.style.background = 'transparent';
                    commentBtn.style.color = '#bbb';
                    commentBtn.style.border = 'none';
                    commentBtn.style.fontSize = '0.93rem';
                    commentBtn.style.marginTop = '10px';
                    commentBtn.style.cursor = 'pointer';
                    commentBtn.style.opacity = '0.6';
                    commentBtn.style.transition = 'opacity 0.2s';
                    commentBtn.onmouseover = () => commentBtn.style.opacity = '1';
                    commentBtn.onmouseout = () => commentBtn.style.opacity = '0.6';
                    card.appendChild(commentBtn);

                    feed.appendChild(card);
                });
            }
        } catch (err) {
            document.getElementById('feed').innerHTML = '<div style="color:#f00;text-align:center;">Error loading posts</div>';
        }
    }
    loadPosts();
    </script>
</body>
</html>
