<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Profile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.6s ease-out; }
    </style>
</head>
<body class="bg-[#0f172a] text-[#f8fafc] min-h-screen flex flex-col items-center py-10 px-4 font-sans">
    <div class="bg-[#1e293b] border border-[#334155] rounded-2xl shadow-2xl max-w-3xl w-full flex flex-col overflow-hidden animate-fade-in">
        <div class="flex flex-wrap items-center p-7 gap-6 border-b border-[#334155]">
            <div class="flex-shrink-0 w-36 h-36 rounded-full border-4 border-[#f4b400] overflow-hidden bg-[#222] flex items-center justify-center" id="profilePic">No picture</div>
            <div class="flex-1 min-w-[250px]">
                <div class="text-3xl font-bold text-[#f4b400] mb-1" id="username">Username</div>
                <div class="text-xl font-semibold">
                    <span id="name">-</span> <span id="surname">-</span>
                </div>
                <div class="text-base text-[#cbd5e1] mt-1">
                    📍 <span id="university">-</span>
                </div>
                <div class="mt-2 text-sm text-[#cbd5e1]">
                    🎂 <span id="birthday">-</span>
                </div>
            </div>
        </div>
        <div class="p-7">
            <div class="mb-6">
                <h2 class="text-xl font-semibold text-[#f4b400] mb-2 border-b border-[#334155] pb-1">Biography</h2>
                <div class="leading-relaxed text-base whitespace-pre-line" id="biography">No biography available.</div>
            </div>
            <div class="mb-6" id="memberSection">
                <h2 class="text-xl font-semibold text-[#f4b400] mb-2 border-b border-[#334155] pb-1">Member of</h2>
                <ul class="list-none p-0 m-0" id="memberofList">
                    <li class="text-[#cbd5e1] italic">None</li>
                </ul>
            </div>
            <div class="mb-6">
                <h2 class="text-xl font-semibold text-[#f4b400] mb-2 border-b border-[#334155] pb-1">Events Participated</h2>
                <ul class="list-none p-0 m-0" id="eventsList">
                    <li class="text-[#cbd5e1] italic">None</li>
                </ul>
            </div>
        </div>
    </div>
    <script>
        const username = "sdc";

        async function fetchStudentDetails() {
            try {
                const response = await fetch(`/api/v1/students/getfrom/${username}`);
                const result = await response.json();
                if (result.success && result.data) {
                    const data = result.data;
                    document.getElementById('username').textContent = data.username;
                    document.getElementById('name').textContent = data.firstName;
                    document.getElementById('surname').textContent = data.lastName;
                    document.getElementById('university').textContent = data.university || '-';

                    if (data.birthdate) {
                        const date = new Date(data.birthdate);
                        const day = date.getDate().toString().padStart(2, '0');
                        const month = (date.getMonth() + 1).toString().padStart(2, '0');
                        document.getElementById('birthday').textContent = `${day}/${month}`;
                    }

                    const picContainer = document.getElementById('profilePic');
                    picContainer.innerHTML = '';
                    if (data.profiledPicture) {
                        const img = document.createElement('img');
                        img.src = data.profiledPicture;
                        img.alt = "Profile picture";
                        picContainer.appendChild(img);
                    } else {
                        picContainer.textContent = "No picture";
                    }
                } else {
                    document.getElementById('username').textContent = "Student not found";
                }
            } catch {
                document.getElementById('username').textContent = "Error loading student";
            }
        }

        function hideMemberSection() {
            document.getElementById('memberSection').classList.add('hidden');
        }

        async function fetchPersonalDetails() {
            try {
                const response = await fetch(`/api/v1/students/details/${username}`);
                const result = await response.json();
                if (result.success && result.data) {
                    const data = result.data;
                    document.getElementById('biography').textContent = data.biography || "No biography available.";

                    const memberList = document.getElementById('memberofList');
                    memberList.innerHTML = '';
                    if (data.memberof?.length) {
                        data.memberof.forEach(m => {
                            const li = document.createElement('li');
                            li.textContent = m;
                            memberList.appendChild(li);
                        });
                    } else {
                        hideMemberSection();
                    }

                    const eventsList = document.getElementById('eventsList');
                    eventsList.innerHTML = '';
                    if (data.eventsParticipated?.length) {
                        data.eventsParticipated.forEach(e => {
                            const li = document.createElement('li');
                            li.textContent = e;
                            eventsList.appendChild(li);
                        });
                    } else {
                        eventsList.innerHTML = '<li class="empty">None</li>';
                    }
                }
            } catch (error) {
                console.error("Error loading personal details:", error);
            }
        }

        fetchStudentDetails();
        fetchPersonalDetails();
    </script>
</body>
</html>
