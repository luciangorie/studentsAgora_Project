<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Profile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --main: #0f172a;
            --secondary: #1e293b;
            --accent: #f4b400;
            --text: #f8fafc;
            --muted: #cbd5e1;
            --border: #334155;
        }
        body {
            background: var(--main);
            color: var(--text);
            font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 16px;
        }
        .profile-card {
            background: var(--secondary);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            max-width: 850px;
            width: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: fadeIn 0.6s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .profile-header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            padding: 28px;
            gap: 24px;
            border-bottom: 1px solid var(--border);
        }
        .profile-pic {
            flex-shrink: 0;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 3px solid var(--accent);
            overflow: hidden;
            background: #222;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .profile-pic img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .info-block {
            flex: 1;
            min-width: 250px;
        }
        .username {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 4px;
        }
        .name-line {
            font-size: 1.2rem;
            font-weight: 600;
        }
        .university {
            font-size: 1rem;
            color: var(--muted);
            margin-top: 4px;
        }
        .details-line {
            margin-top: 8px;
            font-size: 0.95rem;
            color: var(--muted);
        }
        .profile-body {
            padding: 24px 28px;
        }
        .section {
            margin-bottom: 22px;
        }
        .section h2 {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 8px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 4px;
        }
        .biography {
            line-height: 1.6;
            font-size: 1rem;
            color: var(--text);
            white-space: pre-line;
        }
        ul.list {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }
        ul.list li {
            padding: 6px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 1rem;
        }
        ul.list li:last-child {
            border-bottom: none;
        }
        .empty {
            color: var(--muted);
            font-style: italic;
        }
        .hidden {
            display: none !important;
        }
        .nationality-line {
            margin-top: 8px;
            font-size: 0.95rem;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .flag {
            display: inline-flex;
            overflow: hidden;
            border-radius: 3px;
            width: 28px;
            height: 19px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.4);
            flex-shrink: 0;
        }
        .flag span {
            display: block;
            flex: 1;
            height: 100%;
        }
        /* Italian flag: green / white / red */
        .flag-it .f1 { background: #009246; }
        .flag-it .f2 { background: #fff; }
        .flag-it .f3 { background: #ce2b37; }
        /* Name recording player */
        .recording-player {
            background: #0f172a;
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .rec-play-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: var(--accent);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: transform 0.15s, background 0.2s;
        }
        .rec-play-btn:hover { transform: scale(1.08); background: #e0a200; }
        .rec-play-btn svg { display: block; }
        .rec-mic-icon {
            color: var(--muted);
            flex-shrink: 0;
            opacity: 0.6;
        }
        .rec-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 0;
        }
        .rec-label {
            font-size: 0.78rem;
            color: var(--muted);
            font-weight: 600;
            letter-spacing: 0.6px;
            text-transform: uppercase;
        }
        .rec-name-text {
            font-size: 0.98rem;
            font-weight: 700;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .waveform {
            display: flex;
            align-items: center;
            gap: 3px;
            height: 22px;
        }
        .waveform .bar {
            width: 3px;
            border-radius: 2px;
            background: var(--accent);
            opacity: 0.55;
            animation: wavePulse 1.2s ease-in-out infinite;
        }
        .waveform .bar:nth-child(1)  { height: 8px;  animation-delay: 0s; }
        .waveform .bar:nth-child(2)  { height: 14px; animation-delay: 0.1s; }
        .waveform .bar:nth-child(3)  { height: 18px; animation-delay: 0.2s; }
        .waveform .bar:nth-child(4)  { height: 10px; animation-delay: 0.3s; }
        .waveform .bar:nth-child(5)  { height: 20px; animation-delay: 0.15s; }
        .waveform .bar:nth-child(6)  { height: 12px; animation-delay: 0.25s; }
        .waveform .bar:nth-child(7)  { height: 16px; animation-delay: 0.05s; }
        .waveform .bar:nth-child(8)  { height: 9px;  animation-delay: 0.35s; }
        .waveform .bar:nth-child(9)  { height: 14px; animation-delay: 0.2s; }
        .waveform .bar:nth-child(10) { height: 7px;  animation-delay: 0.4s; }
        .waveform.playing .bar { opacity: 1; }
        @keyframes wavePulse {
            0%, 100% { transform: scaleY(1); }
            50%       { transform: scaleY(0.45); }
        }
        .rec-duration {
            font-size: 0.78rem;
            color: var(--muted);
            flex-shrink: 0;
            font-variant-numeric: tabular-nums;
        }
        @media (max-width: 600px) {
            .profile-header {
                flex-direction: column;
                text-align: center;
            }
            .info-block {
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="profile-card">
        <div class="profile-header">
            <div class="profile-pic" id="profilePic">No picture</div>
            <div class="info-block">
                <div class="username" id="username">Username</div>
                <div class="name-line">
                    <span id="name">-</span> <span id="surname">-</span>
                </div>
                <div class="university">
                    📍 <span id="university">-</span>
                </div>
                <div class="details-line">
                    🎂 <span id="birthday">-</span>
                </div>
                <div class="nationality-line">
                    <div class="flag flag-it"><span class="f1"></span><span class="f2"></span><span class="f3"></span></div>
                    <span>Italian</span>
                </div>
            </div>
        </div>
        <div class="profile-body">
            <div class="section">
                <h2>Name Recording</h2>
                <div class="recording-player">
                    <svg class="rec-mic-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="9" y="2" width="6" height="12" rx="3"/>
                        <path d="M5 10a7 7 0 0 0 14 0"/>
                        <line x1="12" y1="19" x2="12" y2="22"/>
                        <line x1="9" y1="22" x2="15" y2="22"/>
                    </svg>
                    <button class="rec-play-btn" id="recPlayBtn" title="Play name">
                        <!-- play icon -->
                        <svg id="recPlayIcon" width="18" height="18" viewBox="0 0 24 24" fill="#0f172a">
                            <polygon points="6,3 20,12 6,21"/>
                        </svg>
                    </button>
                    <div class="rec-info">
                        <span class="rec-label">Name pronunciation</span>
                        <span class="rec-name-text" id="recNameText">—</span>
                        <div class="waveform" id="recWaveform">
                            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                            <div class="bar"></div>
                        </div>
                    </div>
                    <span class="rec-duration">0:03</span>
                </div>
            </div>
            <div class="section">
                <h2>Biography</h2>
                <div class="biography" id="biography">No biography available.</div>
            </div>
            <div class="section" id="memberSection">
                <h2>Member of</h2>
                <ul class="list" id="memberofList">
                    <li class="empty">None</li>
                </ul>
            </div>
            <div class="section">
                <h2>Events Participated</h2>
                <ul class="list" id="eventsList">
                    <li class="empty">None</li>
                </ul>
            </div>
        </div>
    </div>
    <script>
        const username = "sdc";

        async function fetchStudentDetails() {
            try {
                const response = await fetch(`/api/v1/students/getfrom/${username}`);
                const result = await response.json();
                if (result.success && result.data) {
                    const data = result.data;
                    document.getElementById('username').textContent = data.username;
                    document.getElementById('name').textContent = data.firstName;
                    document.getElementById('surname').textContent = data.lastName;
                    document.getElementById('recNameText').textContent = (data.firstName || '') + ' ' + (data.lastName || '');
                    document.getElementById('university').textContent = data.university || '-';

                    if (data.birthdate) {
                        const date = new Date(data.birthdate);
                        const day = date.getDate().toString().padStart(2, '0');
                        const month = (date.getMonth() + 1).toString().padStart(2, '0');
                        document.getElementById('birthday').textContent = `${day}/${month}`;
                    }

                    const picContainer = document.getElementById('profilePic');
                    picContainer.innerHTML = '';
                    if (data.profiledPicture) {
                        const img = document.createElement('img');
                        img.src = data.profiledPicture;
                        img.alt = "Profile picture";
                        picContainer.appendChild(img);
                    } else {
                        picContainer.textContent = "No picture";
                    }
                } else {
                    document.getElementById('username').textContent = "Student not found";
                }
            } catch {
                document.getElementById('username').textContent = "Error loading student";
            }
        }

        function hideMemberSection() {
            document.getElementById('memberSection').classList.add('hidden');
        }

        async function fetchPersonalDetails() {
            try {
                const response = await fetch(`/api/v1/students/details/${username}`);
                const result = await response.json();
                if (result.success && result.data) {
                    const data = result.data;
                    document.getElementById('biography').textContent = data.biography || "No biography available.";

                    const memberList = document.getElementById('memberofList');
                    memberList.innerHTML = '';
                    if (data.memberof?.length) {
                        data.memberof.forEach(m => {
                            const li = document.createElement('li');
                            li.textContent = m;
                            memberList.appendChild(li);
                        });
                    } else {
                        hideMemberSection();
                    }

                    const eventsList = document.getElementById('eventsList');
                    eventsList.innerHTML = '';
                    if (data.eventsParticipated?.length) {
                        data.eventsParticipated.forEach(e => {
                            const li = document.createElement('li');
                            li.textContent = e;
                            eventsList.appendChild(li);
                        });
                    } else {
                        eventsList.innerHTML = '<li class="empty">None</li>';
                    }
                }
            } catch (error) {
                console.error("Error loading personal details:", error);
            }
        }

        // Name recording player
        document.getElementById('recPlayBtn').addEventListener('click', function () {
            const nameEl = document.getElementById('name');
            const surnameEl = document.getElementById('surname');
            const fullName = (nameEl.textContent + ' ' + surnameEl.textContent).trim();
            if (!fullName || fullName === '- -') return;
            if (window.speechSynthesis) {
                window.speechSynthesis.cancel();
                const utter = new SpeechSynthesisUtterance(fullName);
                utter.lang = 'it-IT';
                utter.rate = 0.85;
                const waveform = document.getElementById('recWaveform');
                const playIcon = document.getElementById('recPlayIcon');
                // swap to pause icon
                playIcon.innerHTML = '<rect x="5" y="3" width="4" height="18" rx="1"/><rect x="15" y="3" width="4" height="18" rx="1"/>';
                waveform.classList.add('playing');
                utter.onend = utter.onerror = function () {
                    playIcon.innerHTML = '<polygon points="6,3 20,12 6,21"/>';
                    waveform.classList.remove('playing');
                };
                window.speechSynthesis.speak(utter);
            }
        });

        fetchStudentDetails();
        fetchPersonalDetails();
    </script>
</body>
</html>
