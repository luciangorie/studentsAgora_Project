<!DOCTYPE html>
<html lang="en"></html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Representative Registration - Student's Agora</title>
    <script src="https://cdn.tailwindcss.com"><\/script>
    <style>
        .notification { display: flex; }
        .notification.show { opacity: 1 !important; pointer-events: auto !important; }
        .notification.success { background: linear-gradient(90deg, #1a1f2b 80%, #4caf50 100%); color: #4caf50; border: 2px solid #4caf50; }
        .notification.error { background: linear-gradient(90deg, #1a1f2b 80%, #ff4d4f 100%); color: #ff4d4f; border: 2px solid #ff4d4f; }
    </style>
</head>
<body class="bg-[#1a1f2b] text-[#e5e5e5] min-h-screen p-5 font-sans">
    <div id="notification" class="notification fixed top-8 left-1/2 -translate-x-1/2 min-w-[320px] max-w-[90vw] py-6 px-8 pl-16 rounded-xl shadow-xl text-lg font-medium items-center z-[1000] opacity-0 pointer-events-none transition-opacity">
        <span class="absolute left-6 text-3xl" id="notificationIcon"></span>
        <span id="notificationMessage"></span>
        <button class="ml-auto bg-transparent border-none text-inherit text-2xl cursor-pointer px-2" id="notificationClose" aria-label="Close">&times;</button>
    </div>
    <div class="max-w-lg mx-auto mt-10 bg-[#14213d]/97 p-8 rounded-2xl shadow-2xl border border-[#fca311] relative z-10">
        <h1 class="text-[#fca311] text-center text-[2.1rem] font-bold tracking-wide mb-2">Student Representative</h1>
        <p class="mb-5 text-center italic">Register as a university representative on <span class="text-[#fca311] font-bold">Student's Agora</span></p>
        <form id="adminRegistrationForm" autocomplete="off">
            <div class="mb-4">
                <label class="block mb-2 font-semibold text-[#fca311] tracking-wide" for="firstName">First Name</label>
                <input class="w-full px-4 py-3 border border-[#c97c00] rounded-md bg-[#22263a] text-[#e5e5e5] text-base focus:border-[#fca311] focus:outline-none" type="text" id="firstName" name="firstName" required>
            </div>
            <div class="mb-4">
                <label class="block mb-2 font-semibold text-[#fca311] tracking-wide" for="lastName">Last Name</label>
                <input class="w-full px-4 py-3 border border-[#c97c00] rounded-md bg-[#22263a] text-[#e5e5e5] text-base focus:border-[#fca311] focus:outline-none" type="text" id="lastName" name="lastName" required>
            </div>
            <div class="mb-4">
                <label class="block mb-2 font-semibold text-[#fca311] tracking-wide" for="email">University Email</label>
                <input class="w-full px-4 py-3 border border-[#c97c00] rounded-md bg-[#22263a] text-[#e5e5e5] text-base focus:border-[#fca311] focus:outline-none" type="email" id="email" name="email" required>
            </div>
            <div class="mb-4">
                <label class="block mb-2 font-semibold text-[#fca311] tracking-wide" for="birthdate">Date of Birth</label>
                <input class="w-full px-4 py-3 border border-[#c97c00] rounded-md bg-[#22263a] text-[#e5e5e5] text-base focus:border-[#fca311] focus:outline-none" type="date" id="birthdate" name="birthdate" required>
            </div>
            <div class="mb-4">
                <label class="block mb-2 font-semibold text-[#fca311] tracking-wide" for="university">University</label>
                <select class="w-full px-4 py-3 border border-[#c97c00] rounded-md bg-[#22263a] text-[#e5e5e5] text-base focus:border-[#fca311] focus:outline-none" id="university" name="university" required>
                    <option value="">Select your university</option>
                    <option value="DCU Dublin City University">DCU Dublin City University</option>
                    <option value="INSA (France)">INSA (France)</option>
                    <option value="UAB Universidad Autonoma de Barcelona">UAB Universidad Autonoma de Barcelona</option>
                    <option value="TUHH Hamburg University">TUHH Hamburg University</option>
                    <option value="Tampere University">Tampere University</option>
                    <option value="LiU - Linkoping University">LiU - Linkoping University</option>
                    <option value="UiS - University of Stavanger">UiS - University of Stavanger</option>
                    <option value="Tecnologico Monterrey">Tecnologico Monterrey</option>
                    <option value="KTU Kaunas University">KTU Kaunas University</option>
                    <option value="University of Twente">University of Twente</option>
                    <option value="University of Trento">University of Trento</option>
                    <option value="Universidade de Aveiro">Universidade de Aveiro</option>
                    <option value="TUL - Lodz University of Technology">TUL - Lodz University of Technology</option>
                </select>
            </div>
            <div class="mb-4">
                <label class="block mb-2 font-semibold text-[#fca311] tracking-wide" for="begin">Start Date of Mandate</label>
                <input class="w-full px-4 py-3 border border-[#c97c00] rounded-md bg-[#22263a] text-[#e5e5e5] text-base focus:border-[#fca311] focus:outline-none" type="date" id="begin" name="begin" required>
            </div>
            <div class="mb-4">
                <label class="block mb-2 font-semibold text-[#fca311] tracking-wide" for="username">Username</label>
                <input class="w-full px-4 py-3 border border-[#c97c00] rounded-md bg-[#22263a] text-[#e5e5e5] text-base focus:border-[#fca311] focus:outline-none" type="text" id="username" name="username" required>
            </div>
            <div class="mb-4">
                <label class="block mb-2 font-semibold text-[#fca311] tracking-wide" for="password">Password</label>
                <input class="w-full px-4 py-3 border border-[#c97c00] rounded-md bg-[#22263a] text-[#e5e5e5] text-base focus:border-[#fca311] focus:outline-none" type="password" id="password" name="password" required minlength="8">
            </div>
            <div class="mb-4">
                <label class="block mb-2 font-semibold text-[#fca311] tracking-wide" for="confirm_password">Confirm Password</label>
                <input class="w-full px-4 py-3 border border-[#c97c00] rounded-md bg-[#22263a] text-[#e5e5e5] text-base focus:border-[#fca311] focus:outline-none" type="password" id="confirm_password" name="confirm_password" required minlength="8">
            </div>
            <button type="submit" class="w-full bg-gradient-to-r from-[#fca311] to-[#c97c00] text-[#14213d] py-3 border-none rounded-md cursor-pointer text-lg font-bold mb-3 hover:from-[#c97c00] hover:to-[#fca311] transition-all">Register as Student Representative</button>
        </form>
        <button class="w-full bg-[#14213d] text-[#fca311] py-3 border border-[#fca311] rounded-md cursor-pointer text-base font-semibold mt-2 hover:bg-[#fca311] hover:text-[#14213d] transition-all" onclick="window.location.href='login.html'">Already have an account? Login</button>
    </div>
    <script>
        // Notification logic
        function showNotification(message, type, callback) {
            const notification = document.getElementById('notification');
            const icon = document.getElementById('notificationIcon');
            const msg = document.getElementById('notificationMessage');
            const closeBtn = document.getElementById('notificationClose');

            notification.className = 'notification ' + type;
            msg.textContent = message;

            if (type === 'success') {
                icon.textContent = '✓';
            } else {
                icon.textContent = '!';
            }

            notification.classList.add('show');

            function closeHandler() {
                notification.classList.remove('show');
                closeBtn.removeEventListener('click', closeHandler);
                if (callback) callback();
            }

            closeBtn.onclick = closeHandler;

            // Auto-close after 2s for success, 5s for error
            let timeout = setTimeout(closeHandler, type === 'success' ? 2000 : 5000);

            // Prevent multiple timeouts
            closeBtn.onmouseenter = () => clearTimeout(timeout);
            closeBtn.onmouseleave = () => timeout = setTimeout(closeHandler, type === 'success' ? 2000 : 5000);
        }

        // Registration form logic
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('adminRegistrationForm');
            if (!form) return;
            form.addEventListener('submit', async function(e) {
                e.preventDefault();

                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirm_password').value;
                if (password !== confirmPassword) {
                    showNotification('Passwords do not match!', 'error');
                    return;
                }

                try {
                    const firstName = document.getElementById('firstName').value.trim();
                    const lastName = document.getElementById('lastName').value.trim();
                    const email = document.getElementById('email').value.trim();
                    const username = document.getElementById('username').value.trim();
                    const birthdate = document.getElementById('birthdate').value;
                    const university = document.getElementById('university').value; // selected string
                    const begin = document.getElementById('begin').value;

                    const response = await fetch('/api/v1/accounts/admin-registrazione', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            firstName, lastName, email, username, password, birthdate, university, begin
                        })
                    });

                    let data;
                    try { data = await response.json(); } catch { data = {}; }

                    if (!response.ok) {
                        throw new Error(data.error || 'Registration error');
                    }

                    window.location.href = '/success.html';

                } catch (error) {
                    showNotification(error.message, 'error');
                }
            });
        });
    </script>
</body>
</html>
