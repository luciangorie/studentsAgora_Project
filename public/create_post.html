<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Post</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#1a1f2b] text-[#e5e5e5] min-h-screen flex flex-col items-center font-sans">
    <div class="bg-[#14213d]/97 rounded-2xl shadow-2xl border border-[#fca311] p-8 mt-10 max-w-sm w-full flex flex-col items-center">
        <h1 class="text-[#fca311] text-2xl font-bold mb-5">Create a Post</h1>
        <form id="postForm">
            <div class="mb-4 w-full">
                <label class="block mb-2 font-semibold text-[#fca311]" for="picture">Photo Link</label>
                <input class="w-full px-3 py-2 border border-[#c97c00] rounded-md bg-[#22263a] text-[#e5e5e5] text-base focus:border-[#fca311] focus:outline-none" type="text" id="picture" name="picture" placeholder="Paste image URL here">
            </div>
            <div class="mb-4 w-full">
                <label class="block mb-2 font-semibold text-[#fca311]" for="text">Description</label>
                <textarea class="w-full px-3 py-2 border border-[#c97c00] rounded-md bg-[#22263a] text-[#e5e5e5] text-base focus:border-[#fca311] focus:outline-none min-h-[70px] resize-y" id="text" name="text" required placeholder="Write something..."></textarea>
            </div>
            <div class="mb-4 w-full">
                <label class="block mb-2 font-semibold text-[#fca311]" for="hashtags">Hashtags (comma separated)</label>
                <input class="w-full px-3 py-2 border border-[#c97c00] rounded-md bg-[#22263a] text-[#e5e5e5] text-base focus:border-[#fca311] focus:outline-none" type="text" id="hashtags" name="hashtags" placeholder="#university, #event">
            </div>
            <div class="mb-4 w-full" id="togetherwith-group" style="display:none;">
                <label class="block mb-2 font-semibold text-[#fca311]" for="togetherwith">Together with (comma separated usernames)</label>
                <input class="w-full px-3 py-2 border border-[#c97c00] rounded-md bg-[#22263a] text-[#e5e5e5] text-base focus:border-[#fca311] focus:outline-none" type="text" id="togetherwith" name="togetherwith" placeholder="user1, user2">
            </div>
            <button type="button" class="bg-[#fca311] text-[#14213d] border-none rounded-md px-4 py-2 text-base font-semibold cursor-pointer mb-3 mt-1 hover:bg-[#c97c00] transition-colors" id="addTogetherBtn">Add "Together with"</button>
            <button type="submit" class="w-full bg-gradient-to-r from-[#fca311] to-[#c97c00] text-[#14213d] border-none rounded-md text-lg font-bold py-3 cursor-pointer mt-2 hover:from-[#c97c00] hover:to-[#fca311] transition-all">Post</button>
        </form>
    <script>
        // Funzione per decodificare il JWT (senza validazione firma)
        function parseJwt (token) {
            try {
                return JSON.parse(atob(token.split('.')[1]));
            } catch (e) {
                return null;
            }
        }
        async function getUsernameFromEmail(email) {
            const response = await fetch('/api/v1/accounts/getidbyemail?email=' + encodeURIComponent(email));
            const data = await response.json();
            if (data.success) return data.id;
            return null;
        }
        document.getElementById('addTogetherBtn').addEventListener('click', function() {
            document.getElementById('togetherwith-group').style.display = 'block';
            this.style.display = 'none';
        });
        document.getElementById('postForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const picture = document.getElementById('picture').value.trim();
            const text = document.getElementById('text').value.trim();
            const hashtags = document.getElementById('hashtags').value.trim();
            let togetherwith = [];
            if (document.getElementById('togetherwith-group').style.display !== 'none') {
                togetherwith = document.getElementById('togetherwith').value.split(',').map(s => s.trim()).filter(Boolean);
            }
            let author = 'unknown';
            const token = localStorage.getItem('token');
            if (token) {
                const decoded = parseJwt(token);
                if (decoded && decoded.email) {
                    const username = await getUsernameFromEmail(decoded.email);
                    if (username) author = username;
                }
            }
            const postData = {
                picture,
                text,
                hashtags: hashtags ? hashtags.split(',').map(s => s.trim()).filter(Boolean) : [],
                togetherwith,
                date: new Date().toISOString(),
                author
            };
            try {
                const response = await fetch('/api/v1/posts/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(postData)
                });
                const result = await response.json();
                if (result.success) {
                    alert('Post created successfully!');
                    window.location.href = 'home.html';
                } else {
                    alert('Error: ' + result.error);
                }
            } catch (err) {
                alert('Error: ' + err);
            }
        });
    </script>
</body>
</html>
