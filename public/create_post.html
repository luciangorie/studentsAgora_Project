<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Post</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --main: #14213d;
            --accent: #fca311;
            --accent-dark: #c97c00;
            --bg: #1a1f2b;
            --text: #e5e5e5;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 24px 14px 40px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            background: rgba(20,33,61,0.97);
            border-radius: 18px;
            box-shadow: 0 8px 32px rgba(20,33,61,0.25);
            border: 1.5px solid var(--accent);
            padding: 30px 30px 24px;
            margin-top: 22px;
            max-width: 460px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: var(--accent);
            margin: 0 0 24px;
            font-size: 1.75rem;
            letter-spacing: 0.3px;
        }
        #postForm { width: 100%; }
        .form-group {
            margin-bottom: 16px;
            width: 100%;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--accent);
            letter-spacing: 0.2px;
        }
        input[type="text"], textarea {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid var(--accent-dark);
            border-radius: 6px;
            background: #22263a;
            color: var(--text);
            font-size: 1rem;
            box-sizing: border-box;
            margin-bottom: 6px;
        }
        input[type="text"]:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(252,163,17,0.18);
        }
        select {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid var(--accent-dark);
            border-radius: 6px;
            background: #22263a;
            color: var(--text);
            font-size: 1rem;
            box-sizing: border-box;
            margin-bottom: 6px;
        }
        select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(252,163,17,0.18);
        }
        textarea {
            min-height: 96px;
            resize: vertical;
            line-height: 1.45;
        }
        .upload-area {
            border: 2px dashed var(--accent-dark);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            background: #22263a;
        }
        .upload-area:hover {
            border-color: var(--accent);
            background: #262b40;
        }
        .upload-area input[type="file"] { display: none; }
        #imagePreview {
            display: none;
            max-width: 100%;
            max-height: 200px;
            border-radius: 8px;
            margin-top: 12px;
            object-fit: cover;
        }
        #uploadStatus {
            font-size: 0.9rem;
            margin-top: 6px;
            min-height: 18px;
        }
        .optional-btn {
            background: var(--accent);
            color: var(--main);
            border: none;
            border-radius: 6px;
            padding: 7px 16px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 10px;
            margin-top: 2px;
        }
        .optional-btn:active {
            background: var(--accent-dark);
        }
        .submit-btn {
            background: linear-gradient(90deg, var(--accent) 60%, var(--accent-dark) 100%);
            color: var(--main);
            border: none;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: 700;
            padding: 12px 32px;
            cursor: pointer;
            margin-top: 14px;
            width: 100%;
        }
        .submit-btn:hover {
            background: linear-gradient(90deg, var(--accent-dark) 60%, var(--accent) 100%);
        }
        .ai-hashtag-btn {
            background: #555;
            color: #999;
            border: none;
            border-radius: 6px;
            padding: 7px 16px;
            font-size: 0.92rem;
            font-weight: 600;
            cursor: not-allowed;
            margin: 2px 0 16px;
            transition: background 0.2s, color 0.2s;
        }
        .ai-hashtag-btn.active {
            background: var(--accent);
            color: var(--main);
            cursor: pointer;
        }
        .ai-hashtag-btn.active:hover {
            background: var(--accent-dark);
        }
        .hashtag-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 12px;
        }
        .hashtag-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: #22263a;
            border: 1.5px solid var(--accent-dark);
            border-radius: 6px;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
        }
        .hashtag-checkbox:hover {
            border-color: var(--accent);
            background: #262b40;
        }
        .hashtag-checkbox input[type="checkbox"] {
            cursor: pointer;
            accent-color: var(--accent);
        }
        .hashtag-checkbox label {
            margin: 0;
            font-weight: 500;
            font-size: 0.95rem;
            cursor: pointer;
            color: var(--text);
        }
        .ai-suggestion {
            font-size: 0.92rem;
            color: #b8bfd4;
            margin-top: 6px;
            padding: 8px 12px;
            background: rgba(252,163,17,0.1);
            border-left: 3px solid var(--accent);
            border-radius: 4px;
        }
        .ai-location-suggestion {
            font-size: 0.92rem;
            color: #b8bfd4;
            margin-top: 6px;
            padding: 8px 12px;
            background: rgba(252,163,17,0.1);
            border-left: 3px solid var(--accent);
            border-radius: 4px;
        }
        .ai-location-btn {
            margin-top: 8px;
            background: var(--accent);
            color: var(--main);
            border: none;
            border-radius: 6px;
            padding: 6px 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .ai-location-btn:hover {
            background: var(--accent-dark);
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>Create a Post</h1>
        <form id="postForm">
            <div class="form-group">
                <label>Foto</label>
                <div class="upload-area" id="uploadArea" onclick="document.getElementById('imageFile').click()">
                    <input type="file" id="imageFile" accept="image/jpeg,image/png,image/gif,image/webp">
                    <span id="uploadLabel">Clicca per scegliere un'immagine</span>
                    <img id="imagePreview" alt="Anteprima">
                </div>
                <div id="uploadStatus" style="color:#aaa;"></div>
                <div id="faceInfo" style="font-size:0.92rem;color:#6c3fcf;font-weight:600;margin-top:4px;min-height:18px;"></div>
            </div>
            <div class="form-group">
                <label for="text">Description</label>
                <textarea id="text" name="text" required placeholder="Write something..."></textarea>
            </div>
            <button type="button" class="ai-hashtag-btn" id="aiHashtagBtn" disabled>AI Help - Hashtags</button>
            <div class="form-group">
                <label>Hashtags (select multiple)</label>
                <div class="hashtag-grid" id="hashtagGrid">
                </div>
                <div id="aiHashtagSuggestion" class="ai-suggestion" style="display:none;"></div>
            </div>
            <div class="form-group">
                <label for="location">Location</label>
                <select id="location" name="location" required>
                    <option value="">Select a location</option>
                </select>
                <div id="aiLocationSuggestion" class="ai-location-suggestion" style="display:none;"></div>
                <button type="button" class="ai-location-btn" id="useAiLocationBtn" style="display:none;">Use AI suggestion</button>
            </div>
            <button type="button" class="optional-btn" id="addTogetherBtn">Add tags</button>
            <button type="submit" class="submit-btn">Post</button>
        </form>
    </div>
    <script>
        const CONFIG = {
            hashtags: ['challenge', 'micro-module', 'european_union', 'innovation', 'cutting-edge_technologies', 'community', 'food', 'cultures', 'travel', 'sustainability', 'education', 'networking'],
            locations: ['TUHH Hamburg', 'INSA Strasbourg', 'Placeholder 1', 'Placeholder 2', 'Placeholder 3', 'Placeholder 4', 'Placeholder 5', 'Placeholder 6', 'Placeholder 7', 'Placeholder 8', 'Placeholder 9', 'Placeholder 10']
        };

        const hashtagGrid = document.getElementById('hashtagGrid');
        CONFIG.hashtags.forEach((tag, idx) => {
            const div = document.createElement('div');
            div.className = 'hashtag-checkbox';
            div.innerHTML = `
                <input type="checkbox" id="hashtag_${idx}" name="hashtags" value="${tag}">
                <label for="hashtag_${idx}">${tag}</label>
            `;
            hashtagGrid.appendChild(div);
        });

        const locationSelect = document.getElementById('location');
        CONFIG.locations.forEach(loc => {
            const opt = document.createElement('option');
            opt.value = loc;
            opt.textContent = loc;
            locationSelect.appendChild(opt);
        });

        function parseJwt (token) {
            try {
                return JSON.parse(atob(token.split('.')[1]));
            } catch (e) {
                return null;
            }
        }
        async function getUsernameFromEmail(email) {
            const response = await fetch('/api/v1/accounts/getidbyemail?email=' + encodeURIComponent(email));
            const data = await response.json();
            if (data.success) return data.id;
            return null;
        }

        document.getElementById('text').addEventListener('input', function() {
            const btn = document.getElementById('aiHashtagBtn');
            if (this.value.length > 50) {
                btn.classList.add('active');
                btn.disabled = false;
            } else {
                btn.classList.remove('active');
                btn.disabled = true;
            }
        });

        document.getElementById('aiHashtagBtn').addEventListener('click', function(e) {
            e.preventDefault();
            const suggestionDiv = document.getElementById('aiHashtagSuggestion');
            const randomTags = CONFIG.hashtags.sort(() => Math.random() - 0.5).slice(0, 3);
            suggestionDiv.innerHTML = 'AI Suggested (simulation): ' + randomTags.join(', ');
            suggestionDiv.style.display = 'block';
            
            document.querySelectorAll('input[name="hashtags"]').forEach(cb => {
                cb.checked = randomTags.includes(cb.value);
            });
            
            const suggestedLoc = CONFIG.locations[Math.floor(Math.random() * CONFIG.locations.length)];
            const locSuggestionDiv = document.getElementById('aiLocationSuggestion');
            locSuggestionDiv.innerHTML = '💡 AI Suggested: ' + suggestedLoc;
            locSuggestionDiv.style.display = 'block';
            document.getElementById('location').value = suggestedLoc;
            document.getElementById('useAiLocationBtn').style.display = 'none';
        });

        document.getElementById('location').addEventListener('change', function() {
            if (this.value) {
                const suggestionDiv = document.getElementById('aiLocationSuggestion');
                const suggestedLoc = CONFIG.locations[Math.floor(Math.random() * CONFIG.locations.length)];
                suggestionDiv.innerHTML = 'AI Suggested (simulation): ' + suggestedLoc;
                suggestionDiv.style.display = 'block';
                document.getElementById('useAiLocationBtn').style.display = 'block';
                document.getElementById('useAiLocationBtn').onclick = () => {
                    document.getElementById('location').value = suggestedLoc;
                    suggestionDiv.style.display = 'none';
                    document.getElementById('useAiLocationBtn').style.display = 'none';
                };
            }
        });

        document.getElementById('addTogetherBtn').addEventListener('click', function(e) {
            e.preventDefault();
        });
        let detectedFaceCount = null;
        const modelsReady = faceapi.nets.ssdMobilenetv1.loadFromUri('/models')
            .catch(() => null);
        document.getElementById('imageFile').addEventListener('change', function() {
            const file = this.files[0];
            if (!file) return;
            document.getElementById('uploadLabel').textContent = file.name;
            document.getElementById('faceInfo').textContent = '';
            detectedFaceCount = null;
            const reader = new FileReader();
            reader.onload = async (e) => {
                const preview = document.getElementById('imagePreview');
                preview.src = e.target.result;
                preview.style.display = 'block';
                document.getElementById('uploadStatus').textContent = '';
                document.getElementById('faceInfo').textContent = '🔍 Analisi volti';
                try {
                    await modelsReady;
                    const detections = await faceapi.detectAllFaces(
                        preview,
                        new faceapi.SsdMobilenetv1Options({ minConfidence: 0.4 })
                    );
                    detectedFaceCount = detections.length;
                    document.getElementById('faceInfo').textContent =
                        detectedFaceCount > 0
                            ? (detectedFaceCount >= 3
                                ? `👤 Faces detected: ${detectedFaceCount} — Remember to tag your friends!`
                                : `👤 Faces detected: ${detectedFaceCount}`)
                            : '👤 Nessun volto rilevato';
                } catch {
                    detectedFaceCount = null;
                    document.getElementById('faceInfo').textContent = '';
                }
            };
            reader.readAsDataURL(file);
        });

        document.getElementById('postForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const text = document.getElementById('text').value.trim();
            const hashtagCheckboxes = document.querySelectorAll('input[name="hashtags"]:checked');
            const hashtags = Array.from(hashtagCheckboxes).map(cb => cb.value);
            const location = document.getElementById('location').value;
            
            if (!location) {
                alert('Please select a location');
                return;
            }
            let author = 'unknown';
            const token = localStorage.getItem('token');
            if (token) {
                const decoded = parseJwt(token);
                if (decoded && decoded.email) {
                    const username = await getUsernameFromEmail(decoded.email);
                    if (username) author = username;
                }
            }

            
            let picture = '';
            const fileInput = document.getElementById('imageFile');
            if (fileInput.files.length > 0) {
                const statusEl = document.getElementById('uploadStatus');
                statusEl.style.color = '#fca311';
                statusEl.textContent = 'Caricamento immagine...';
                const formData = new FormData();
                formData.append('image', fileInput.files[0]);
                try {
                    const uploadRes = await fetch('/api/v1/posts/upload', {
                        method: 'POST',
                        body: formData
                    });
                    const uploadResult = await uploadRes.json();
                    if (!uploadResult.success) {
                        statusEl.style.color = '#e74c3c';
                        statusEl.textContent = 'Errore upload: ' + uploadResult.error;
                        return;
                    }
                    picture = uploadResult.url;
                    statusEl.style.color = '#27ae60';
                    statusEl.textContent = 'Immagine caricata!';
                } catch (err) {
                    document.getElementById('uploadStatus').textContent = 'Errore upload: ' + err;
                    return;
                }
            }

            const postData = {
                picture,
                text,
                hashtags: hashtags,
                location: location,
                date: new Date().toISOString(),
                author,
                faceCount: detectedFaceCount
            };
            try {
                const response = await fetch('/api/v1/posts/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(postData)
                });
                const result = await response.json();
                if (result.success) {
                    alert('Post created successfully!');
                    window.location.href = 'home.html';
                } else {
                    alert('Error: ' + result.error);
                }
            } catch (err) {
                alert('Error: ' + err);
            }
        });
    </script>
</body>
</html>
