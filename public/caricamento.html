
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accesso effettuato</title>
    <script src="https://cdn.tailwindcss.com"><\/script>
    <style>
        .progress-bar { transition: width 1.5s linear; }
    </style>
    <script>
        window.onload = function() {
            
            const usermail = window.localStorage.getItem("usermail1");
            if (usermail) {
                document.getElementById('welcome-message').textContent = `Bentornato, ${usermail}!`;
            }
            document.getElementById('progress').style.width = '100%';
            setTimeout(function() {
                window.location.href = '/home.html';
            }, 1500);
        };
    </script>
</head>
<body class="bg-gradient-to-br from-[#1a237e] to-[#fbc02d] text-white min-h-screen flex flex-col items-center justify-center font-sans">
    <h1 id="welcome-message" class="text-[#fbc02d] text-4xl font-bold mb-3 text-center">Accesso effettuato. Caricamento...</h1>
    <div class="w-4/5 max-w-sm bg-[#263159] rounded-lg my-8 shadow-md overflow-hidden">
        <div id="progress" class="progress-bar h-5 bg-gradient-to-r from-[#fbc02d] to-[#1a237e] w-0"></div>
    </div>
    <p class="text-white text-lg text-center">Reindirizzamento in corso...</p>
</body>
</html>
