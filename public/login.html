<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students Agora - Login | ECIU University</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: '#14213d',
                        'navy-dark': '#0f1a2b',
                        amber: '#fca311',
                        'amber-dark': '#c97c00',
                        'app-bg': '#1a1f2b',
                        'input-bg': '#22263a',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-app-bg text-[#e5e5e5] min-h-screen p-5 font-sans">
    <div class="pointer-events-none fixed inset-0 z-0 opacity-[0.08]"></div>
    <div class="max-w-lg mx-auto mt-10 bg-navy/[0.97] p-8 rounded-2xl shadow-2xl border border-amber relative z-10">
        <span class="block mx-auto mb-5 w-14 h-14">
            <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="6" y="20" width="36" height="18" rx="4" fill="#fca311" stroke="#14213d" stroke-width="2"/>
                <rect x="12" y="26" width="24" height="8" rx="2" fill="#14213d" stroke="#fca311" stroke-width="2"/>
                <circle cx="24" cy="14" r="8" fill="#14213d" stroke="#fca311" stroke-width="2"/>
                <rect x="20" y="34" width="8" height="4" rx="2" fill="#c97c00"/>
                <rect x="18" y="38" width="12" height="2" rx="1" fill="#fca311"/>
            </svg>
        </span>
        <h1 class="text-amber text-center text-[2.1rem] font-bold tracking-wide mb-2">Students Agora - Login</h1>
        <p class="mb-5 text-center italic text-[#e5e5e5]">Log in to the ECIU University web app with your personal credentials.</p>
        <form action="/login" method="POST">
            <div class="mb-4">
                <label class="block mb-2 font-semibold text-amber tracking-wide" for="usermail">University Email</label>
                <input class="w-full px-4 py-3 border border-amber-dark rounded-md bg-input-bg text-[#e5e5e5] text-base focus:border-amber focus:outline-none" type="text" id="usermail" name="usermail" required>
            </div>
            <div class="mb-5">
                <label class="block mb-2 font-semibold text-amber tracking-wide" for="password">Password</label>
                <input class="w-full px-4 py-3 border border-amber-dark rounded-md bg-input-bg text-[#e5e5e5] text-base focus:border-amber focus:outline-none" type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="w-full bg-gradient-to-r from-amber to-amber-dark text-navy py-3 border-2 border-[#fbc02d] rounded-md cursor-pointer text-lg font-bold mb-3 hover:from-amber-dark hover:to-amber transition-all" name="userType" value="cliente">Login - Student</button>
            <button type="button" class="w-full bg-gradient-to-r from-navy to-navy-dark text-amber py-3 border-2 border-[#fbc02d] rounded-md cursor-pointer text-lg font-bold mb-3 hover:from-navy-dark hover:to-navy transition-all" onclick="window.location.href='registration-student.html'">Register - Student</button>
            <button type="submit" class="w-full bg-gradient-to-r from-amber to-amber-dark text-navy py-3 border-2 border-[#fbc02d] rounded-md cursor-pointer text-lg font-bold mb-3 hover:from-amber-dark hover:to-amber transition-all" name="userType" value="admin" formaction="/loginadmin">Login - Student Ambassadors &amp; Council</button>
            <button type="button" class="w-full bg-gradient-to-r from-navy to-navy-dark text-amber py-3 border-2 border-[#fbc02d] rounded-md cursor-pointer text-lg font-bold mb-3 hover:from-navy-dark hover:to-navy transition-all" onclick="window.location.href='registrazione.html'">Register as Student Ambassador or Student Council</button>
        </form>
    </div>
</body>
</html>
