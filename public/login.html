<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students Agora - Login | ECIU University</title>
    <style>
        :root {
            --main: #14213d;
            --accent: #fca311;
            --accent-dark: #c97c00;
            --bg: #1a1f2b;
            --input-bg: #22263a;
            --text: #e5e5e5;
            --blue: #14213d;
            --blue-dark: #0f1a2b;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 20px;
            color: var(--text);
            min-height: 100vh;
            position: relative;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='100' height='100' fill='%231a1f2b'/%3E%3Crect x='10' y='10' width='2' height='2' fill='%2314213d'/%3E%3Crect x='30' y='40' width='1' height='1' fill='%23fca311'/%3E%3Crect x='60' y='70' width='2' height='2' fill='%23c97c00'/%3E%3Crect x='80' y='20' width='1' height='1' fill='%23e5e5e5'/%3E%3C/svg%3E");
            background-size: 200px 200px;
        }
        .static-overlay {
            pointer-events: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 0;
            opacity: 0.08;
            background: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='100' height='100' fill='%231a1f2b'/%3E%3Crect x='10' y='10' width='2' height='2' fill='%2314213d'/%3E%3Crect x='30' y='40' width='1' height='1' fill='%23fca311'/%3E%3Crect x='60' y='70' width='2' height='2' fill='%23c97c00'/%3E%3Crect x='80' y='20' width='1' height='1' fill='%23e5e5e5'/%3E%3C/svg%3E");
            background-size: 200px 200px;
        }
        .container {
            max-width: 500px;
            margin: 40px auto;
            background: rgba(20,33,61,0.97);
            padding: 32px 28px 24px 28px;
            border-radius: 18px;
            box-shadow: 0 8px 32px rgba(20,33,61,0.25);
            position: relative;
            border: 1.5px solid var(--accent);
        }
        h1 {
            color: var(--accent);
            text-align: center;
            font-size: 2.1rem;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        .description {
            margin-bottom: 22px;
            text-align: center;
            font-style: italic;
            color: var(--text);
        }
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            margin-bottom: 7px;
            font-weight: 600;
            color: var(--accent);
            letter-spacing: 0.5px;
        }
        input[type="text"],
        input[type="password"],
        select {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid var(--accent-dark);
            border-radius: 6px;
            background: var(--input-bg);
            color: var(--text);
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        input:focus {
            border-color: var(--accent);
            outline: none;
        }
        .login-btn {
            background: linear-gradient(90deg, var(--accent) 60%, var(--accent-dark) 100%);
            color: var(--main);
            padding: 12px 0;
               border: 2px solid #fbc02d; /* bordo giallo scuro */
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 700;
            width: 100%;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(252,163,17,0.08);
            transition: background 0.2s;
        }
        .login-btn:hover {
            background: linear-gradient(90deg, var(--accent-dark) 60%, var(--accent) 100%);
        }
        .register-btn {
            background: linear-gradient(90deg, var(--blue) 60%, var(--blue-dark) 100%);
            color: var(--accent);
            padding: 12px 0;
               border: 2px solid #fbc02d; /* bordo giallo scuro */
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 700;
            width: 100%;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(20,33,61,0.08);
            transition: background 0.2s;
        }
        .register-btn:hover {
            background: linear-gradient(90deg, var(--blue-dark) 60%, var(--blue) 100%);
            color: var(--accent);
        }
        .guest-btn {
            background: linear-gradient(90deg, var(--main) 60%, var(--accent-dark) 100%);
            color: var(--accent);
            padding: 12px 0;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 700;
            width: 100%;
            margin-bottom: 8px;
            box-shadow: 0 2px 8px rgba(20,33,61,0.08);
            transition: background 0.2s;
        }
        .guest-btn:hover {
            background: linear-gradient(90deg, var(--accent-dark) 60%, var(--main) 100%);
            color: var(--accent);
        }
        .divider {
            text-align: center;
            margin: 15px 0;
            color: var(--accent);
            font-weight: bold;
        }
        .icon-university {
            display: block;
            margin: 0 auto 18px auto;
            width: 54px;
            height: 54px;
        }
    </style>
</head>
<body>
    <div class="static-overlay"></div>
    <div class="container">
        <span class="icon-university">
            <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="6" y="20" width="36" height="18" rx="4" fill="#fca311" stroke="#14213d" stroke-width="2"/>
                <rect x="12" y="26" width="24" height="8" rx="2" fill="#14213d" stroke="#fca311" stroke-width="2"/>
                <circle cx="24" cy="14" r="8" fill="#14213d" stroke="#fca311" stroke-width="2"/>
                <rect x="20" y="34" width="8" height="4" rx="2" fill="#c97c00"/>
                <rect x="18" y="38" width="12" height="2" rx="1" fill="#fca311"/>
            </svg>
        </span>
        <h1>Students Agora - Login</h1>
        <p class="description">Log in to the ECIU University web app with your personal credentials.</p>
        <form action="/login" method="POST">
            <div class="form-group">
                <label for="usermail">University Email</label>
                <input type="text" id="usermail" name="usermail" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="login-btn" name="userType" value="cliente">Login - Student</button>
            <button type="button" class="register-btn" onclick="window.location.href='registration-student.html'">Register - Student</button>
            <button type="submit" class="login-btn" name="userType" value="admin" formaction="/loginadmin">Login - Student Ambassadors &amp; Council</button>
            <button type="button" class="register-btn" onclick="window.location.href='registrazione.html'">Register as Student Ambassador or Student Council</button>
        </form>
        <!-- Guest button removed -->
    </div>
    <script>
        document.getElementById('guestForm').addEventListener('submit', function(e) {
            localStorage.removeItem('token');
            window.location.href = '/caricamento.html';
            e.preventDefault();
        });
    </script>
</body>
</html>
