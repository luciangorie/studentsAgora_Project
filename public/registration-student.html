<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration - Student's Agora</title>
    <style>
        :root {
            --main: #14213d;
            --accent: #fca311;
            --accent-dark: #c97c00;
            --bg: #1a1f2b;
            --input-bg: #22263a;
            --text: #e5e5e5;
            --error: #ff4d4f;
            --success: #4caf50;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 20px;
            color: var(--text);
            min-height: 100vh;
            position: relative;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='100' height='100' fill='%231a1f2b'/%3E%3Crect x='10' y='10' width='2' height='2' fill='%2314213d'/%3E%3Crect x='30' y='40' width='1' height='1' fill='%23fca311'/%3E%3Crect x='60' y='70' width='2' height='2' fill='%23c97c00'/%3E%3Crect x='80' y='20' width='1' height='1' fill='%23e5e5e5'/%3E%3C/svg%3E");
            background-size: 200px 200px;
        }
        .container {
            max-width: 500px;
            margin: 40px auto;
            background: rgba(20,33,61,0.97);
            padding: 32px 28px 24px 28px;
            border-radius: 18px;
            box-shadow: 0 8px 32px rgba(20,33,61,0.25);
            position: relative;
            border: 1.5px solid var(--accent);
        }
        h1 {
            color: var(--accent);
            text-align: center;
            font-size: 2.1rem;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        .description {
            margin-bottom: 22px;
            text-align: center;
            font-style: italic;
            color: var(--text);
        }
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            margin-bottom: 7px;
            font-weight: 600;
            color: var(--accent);
            letter-spacing: 0.5px;
        }
        input[type="text"],
        input[type="password"],
        input[type="email"],
        input[type="date"],
        select {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid var(--accent-dark);
            border-radius: 6px;
            background: var(--input-bg);
            color: var(--text);
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        input:focus, select:focus {
            border-color: var(--accent);
            outline: none;
        }
        .register-btn {
            background: linear-gradient(90deg, var(--accent) 60%, var(--accent-dark) 100%);
            color: var(--main);
            padding: 12px 0;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 700;
            width: 100%;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(252,163,17,0.08);
            transition: background 0.2s;
        }
        .register-btn:hover {
            background: linear-gradient(90deg, var(--accent-dark) 60%, var(--accent) 100%);
        }
        .login-btn {
            background: var(--main);
            color: var(--accent);
            padding: 10px 0;
            border: 1.5px solid var(--accent);
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            width: 100%;
            font-weight: 600;
            margin-top: 6px;
            transition: background 0.2s, color 0.2s;
        }
        .login-btn:hover {
            background: var(--accent);
            color: var(--main);
        }
        .notification {
            position: fixed;
            top: 32px;
            left: 50%;
            transform: translateX(-50%);
            min-width: 320px;
            max-width: 90vw;
            padding: 24px 32px 24px 64px;
            border-radius: 10px;
            box-shadow: 0 4px 24px rgba(20,33,61,0.18);
            font-size: 18px;
            font-weight: 500;
            display: flex;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .notification.show {
            opacity: 1;
            pointer-events: auto;
        }
        .notification.success {
            background: linear-gradient(90deg, #1a1f2b 80%, #4caf50 100%);
            color: #4caf50;
            border: 2px solid #4caf50;
        }
        .notification.error {
            background: linear-gradient(90deg, #1a1f2b 80%, #ff4d4f 100%);
            color: #ff4d4f;
            border: 2px solid #ff4d4f;
        }
        .notification .icon {
            position: absolute;
            left: 24px;
            font-size: 32px;
        }
        .notification .close-btn {
            margin-left: auto;
            background: none;
            border: none;
            color: inherit;
            font-size: 22px;
            cursor: pointer;
            padding: 0 8px;
        }
        .static-overlay {
            pointer-events: none;
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 0;
            opacity: 0.08;
            background: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='100' height='100' fill='%231a1f2b'/%3E%3Crect x='10' y='10' width='2' height='2' fill='%2314213d'/%3E%3Crect x='30' y='40' width='1' height='1' fill='%23fca311'/%3E%3Crect x='60' y='70' width='2' height='2' fill='%23c97c00'/%3E%3Crect x='80' y='20' width='1' height='1' fill='%23e5e5e5'/%3E%3C/svg%3E");
            background-size: 200px 200px;
        }
    </style>
</head>
<body>
    <div class="static-overlay"></div>
    <div class="container">
        <div id="notification" class="notification">
            <span class="icon" id="notificationIcon"></span>
            <span id="notificationMessage"></span>
            <button class="close-btn" id="notificationClose" aria-label="Close">&times;</button>
        </div>
        <h1>Student Registration</h1>
        <p class="description">Register as a student on <span style="color:var(--accent);font-weight:700;">Student's Agora</span></p>
        <form id="studentRegistrationForm" autocomplete="off">
            <div class="form-group">
                <label for="firstName">First Name</label>
                <input type="text" id="firstName" name="firstName" required>
            </div>
            <div class="form-group">
                <label for="lastName">Last Name</label>
                <input type="text" id="lastName" name="lastName" required>
            </div>
            <div class="form-group">
                <label for="email">University Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="birthdate">Date of Birth</label>
                <input type="date" id="birthdate" name="birthdate" required>
            </div>
            <div class="form-group">
                <label for="university">University</label>
                <select id="university" name="university" required>
                    <option value="">Select your university</option>
                    <option value="DCU Dublin City University">DCU Dublin City University</option>
                    <option value="INSA (France)">INSA (France)</option>
                    <option value="UAB Universidad Autonoma de Barcelona">UAB Universidad Autonoma de Barcelona</option>
                    <option value="TUHH Hamburg University">TUHH Hamburg University</option>
                    <option value="Tampere University">Tampere University</option>
                    <option value="LiU - Linkoping University">LiU - Linkoping University</option>
                    <option value="UiS - University of Stavanger">UiS - University of Stavanger</option>
                    <option value="Tecnologico Monterrey">Tecnologico Monterrey</option>
                    <option value="KTU Kaunas University">KTU Kaunas University</option>
                    <option value="University of Twente">University of Twente</option>
                    <option value="University of Trento">University of Trento</option>
                    <option value="Universidade de Aveiro">Universidade de Aveiro</option>
                    <option value="TUL - Lodz University of Technology">TUL - Lodz University of Technology</option>
                </select>
            </div>
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required minlength="8">
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required minlength="8">
            </div>
            <div class="form-group">
                <label for="profiledPicture">Profile Picture URL</label>
                <input type="text" id="profiledPicture" name="profiledPicture" placeholder="Paste image URL here" required>
            </div>
            <button type="submit" class="register-btn">Register as Student</button>
        </form>
        <button class="login-btn" onclick="window.location.href='login.html'">Already have an account? Login</button>
    </div>
    <script>
        // Notification logic
        function showNotification(message, type, callback) {
            const notification = document.getElementById('notification');
            const icon = document.getElementById('notificationIcon');
            const msg = document.getElementById('notificationMessage');
            const closeBtn = document.getElementById('notificationClose');

            notification.className = 'notification ' + type;
            msg.textContent = message;

            if (type === 'success') {
                icon.textContent = '✓';
            } else {
                icon.textContent = '!';
            }

            notification.classList.add('show');

            function closeHandler() {
                notification.classList.remove('show');
                closeBtn.removeEventListener('click', closeHandler);
                if (callback) callback();
            }

            closeBtn.onclick = closeHandler;

            // Auto-close after 2s for success, 5s for error
            let timeout = setTimeout(closeHandler, type === 'success' ? 2000 : 5000);

            // Prevent multiple timeouts
            closeBtn.onmouseenter = () => clearTimeout(timeout);
            closeBtn.onmouseleave = () => timeout = setTimeout(closeHandler, type === 'success' ? 2000 : 5000);
        }

        // Registration form logic
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('studentRegistrationForm');
            if (!form) return;
            form.addEventListener('submit', async function(e) {
                e.preventDefault();

                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirm_password').value;
                if (password !== confirmPassword) {
                    showNotification('Passwords do not match!', 'error');
                    return;
                }

                try {
                    const firstName = document.getElementById('firstName').value.trim();
                    const lastName = document.getElementById('lastName').value.trim();
                    const email = document.getElementById('email').value.trim();
                    const username = document.getElementById('username').value.trim();
                    const birthdate = document.getElementById('birthdate').value;
                    const university = document.getElementById('university').value;
                    const profiledPicture = document.getElementById('profiledPicture').value.trim();

                    const response = await fetch('/api/v1/accounts/student-registrazione', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            firstName, lastName, email, username, password, birthdate, university, profiledPicture
                        })
                    });

                    let data;
                    try { data = await response.json(); } catch { data = {}; }

                    if (!response.ok) {
                        throw new Error(data.error || 'Registration error');
                    }

                    window.location.href = '/success-student.html';

                } catch (error) {
                    showNotification(error.message, 'error');
                }
            });
        });
    </script>
</body>
</html>
